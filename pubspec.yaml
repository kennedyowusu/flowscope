name: flowscope
description: "Real-time Flutter debugging SDK. Inspect Riverpod state, network requests, and events from an in-app overlay — without leaving your app."
version: 0.1.2
homepage: https://flowscope.dev
repository: https://github.com/kennedyowusu/flowscope
issue_tracker: https://github.com/kennedyowusu/flowscope/issues

environment:
  sdk: ^3.8.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  uuid: ^4.0.0
  flutter_riverpod: ^3.0.0
  dio: ^5.0.0
  intl: ^0.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
